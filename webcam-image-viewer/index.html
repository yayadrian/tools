<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam Image Viewer</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --card-bg: rgba(15, 23, 42, 0.75);
      --accent: #38bdf8;
      --border: rgba(148, 163, 184, 0.3);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --danger: #f87171;
      --overlay: rgba(0, 0, 0, 0.6);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Helvetica, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 0;
      gap: 0;
    }

    header {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
    }

    .refresh-info {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    }

    .cog-btn {
      cursor: pointer;
      border: none;
      background: rgba(0, 0, 0, 0.4);
      color: rgba(255, 255, 255, 0.8);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }

    .cog-btn:hover {
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
    }

    .cog-btn svg {
      width: 1.3rem;
      height: 1.3rem;
      fill: currentColor;
    }

    /* Grid */
    .tiles {
      display: grid;
      gap: 0;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
      width: 100%;
      flex: 1;
    }

    .tile {
      position: relative;
      background: #000;
      border: none;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .tile:hover {
      opacity: 0.95;
    }

    .tile-image-wrap {
      position: relative;
      aspect-ratio: var(--aspect-ratio, 16 / 9);
      background: #000;
      overflow: hidden;
    }

    .tile-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    .tile-image-wrap img:not([src]) {
      visibility: hidden;
    }

    .tile-crossfade-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .tile-image-wrap .gif-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: 1;
    }

    .tile:hover .tile-image-wrap .gif-layer {
      opacity: 1;
    }

    .tile:hover .tile-image-wrap .jpg-layer {
      opacity: 0;
    }

    .tile-loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .tile-loading-overlay[hidden] {
      display: none;
    }

    .tile-loading-overlay::after {
      content: '';
      width: 2rem;
      height: 2rem;
      border: 3px solid rgba(148, 163, 184, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .tile-error-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.7);
      z-index: 3;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tile-error-overlay p {
      margin: 0;
    }

    .tile-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.85rem;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
      font-size: 0.85rem;
      gap: 0.5rem;
      z-index: 4;
    }

    .tile-name {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    }

    .tile-link-icon {
      color: var(--accent);
      flex-shrink: 0;
      display: flex;
    }

    .tile-link-icon svg {
      width: 0.9rem;
      height: 0.9rem;
    }

    .empty-state {
      border: 1px dashed rgba(148, 163, 184, 0.35);
      border-radius: 1rem;
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.45);
      font-size: 1.05rem;
      max-width: 600px;
      width: 100%;
      margin: auto;
    }

    .empty-state p {
      margin: 0 0 1rem;
    }

    .empty-state button {
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
      padding: 0.75rem 1.2rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
    }

    /* Modal overlay */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 1rem;
      width: min(600px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .modal-close {
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 1.5rem;
      line-height: 1;
      padding: 0.25rem;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-section {
      margin-bottom: 1.5rem;
    }

    .modal-section:last-child {
      margin-bottom: 0;
    }

    .modal-section h3 {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }

    .form-row label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .form-row input {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      padding: 0.7rem 0.85rem;
      border-radius: 0.6rem;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-row input:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }

    .form-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .btn {
      cursor: pointer;
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.2rem;
      border-radius: 0.65rem;
      font-size: 0.9rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: var(--accent);
      color: #0f172a;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 12px 28px rgba(56, 189, 248, 0.4);
    }

    .btn-secondary {
      background: rgba(148, 163, 184, 0.15);
      color: var(--muted);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(148, 163, 184, 0.25);
      color: var(--text);
      box-shadow: none;
    }

    .btn-danger {
      background: rgba(248, 113, 113, 0.15);
      color: var(--danger);
      box-shadow: none;
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.25);
      box-shadow: none;
    }

    /* Webcam list in modal */
    .webcam-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .webcam-list-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 0.6rem;
    }

    .webcam-list-item .item-name {
      flex: 1;
      font-weight: 600;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .webcam-list-item .item-url {
      flex: 1;
      font-size: 0.8rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-actions {
      display: flex;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .item-btn {
      cursor: pointer;
      border: none;
      background: rgba(148, 163, 184, 0.2);
      color: var(--text);
      padding: 0.25rem 0.45rem;
      border-radius: 0.35rem;
      font-size: 0.75rem;
      line-height: 1;
    }

    .item-btn:hover {
      background: rgba(148, 163, 184, 0.35);
    }

    .item-btn.delete:hover {
      background: rgba(248, 113, 113, 0.3);
      color: var(--danger);
    }

    /* Edit form inline */
    .webcam-edit-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 0.6rem;
    }

    .webcam-edit-form input {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      padding: 0.55rem 0.7rem;
      border-radius: 0.5rem;
      font-size: 16px;
      font-family: inherit;
    }

    .webcam-edit-form input:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }

    .edit-actions {
      display: flex;
      gap: 0.4rem;
    }

    @media (max-width: 720px) {
      .tiles {
        grid-template-columns: 1fr;
      }

      .webcam-list-item {
        flex-wrap: wrap;
      }

      .webcam-list-item .item-url {
        flex-basis: 100%;
        order: 3;
      }
    }
  </style>
</head>
<body>
  <header>
    <span class="refresh-info" id="refreshInfo"></span>
    <button class="cog-btn" id="settingsBtn" type="button" aria-label="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    </button>
  </header>

  <section class="tiles" id="tiles" aria-label="Webcam images"></section>

  <div class="empty-state" id="emptyState">
    <p>No webcams configured yet.<br>Click the settings icon to add your first webcam.</p>
    <button type="button" id="emptyAddBtn">Open Settings</button>
  </div>

  <!-- Settings Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-label="Webcam Settings" aria-modal="true">
      <div class="modal-header">
        <h2>Webcam Settings</h2>
        <button class="modal-close" id="modalClose" aria-label="Close settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <h3>Add Webcam</h3>
          <form id="addForm">
            <div class="form-row">
              <label for="addName">Name</label>
              <input type="text" id="addName" placeholder="e.g. Swanage Lifeboat" required>
            </div>
            <div class="form-row">
              <label for="addSnapshotUrl">Webcam Image URL</label>
              <input type="url" id="addSnapshotUrl" placeholder="https://webcamsnapshot.yayproject.com/snapshot?url=..." required>
            </div>
            <div class="form-row">
              <label for="addLinkUrl">Link URL</label>
              <input type="url" id="addLinkUrl" placeholder="https://example.com/webcam-page">
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Add Webcam</button>
            </div>
          </form>
        </div>

        <div class="modal-section" id="webcamListSection">
          <h3>Current Webcams</h3>
          <ul class="webcam-list" id="webcamList"></ul>
        </div>

        <div class="modal-section">
          <h3>Defaults</h3>
          <p style="font-size: 0.85rem; color: var(--muted); margin: 0 0 0.75rem;">Clear local changes and reload webcams from config.json.</p>
          <button type="button" class="btn btn-danger" id="resetDefaultsBtn">Reset to Defaults</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
const STORAGE_KEY = 'webcamImageViewer:webcams';
const SETTINGS_STORAGE_KEY = 'webcamImageViewer:settings';
const DEFAULT_REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes
const DEFAULT_GRID_MIN_COL_WIDTH = 380;
const DEFAULT_ASPECT_RATIO = '16 / 9';
let REFRESH_INTERVAL = DEFAULT_REFRESH_INTERVAL;

const tilesContainer = document.getElementById('tiles');
const emptyState = document.getElementById('emptyState');
const settingsBtn = document.getElementById('settingsBtn');
const emptyAddBtn = document.getElementById('emptyAddBtn');
const modalBackdrop = document.getElementById('modalBackdrop');
const modalClose = document.getElementById('modalClose');
const addForm = document.getElementById('addForm');
const addName = document.getElementById('addName');
const addSnapshotUrl = document.getElementById('addSnapshotUrl');
const addLinkUrl = document.getElementById('addLinkUrl');
const webcamList = document.getElementById('webcamList');
const webcamListSection = document.getElementById('webcamListSection');
const refreshInfo = document.getElementById('refreshInfo');
const resetDefaultsBtn = document.getElementById('resetDefaultsBtn');

let webcams = [];
let nextId = 1;
let tileData = new Map(); // id -> { jpgUrl, gifUrl }
let refreshTimer = null;
let editingId = null;

// --- State persistence ---

function loadWebcams() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed.filter(w => w && typeof w.name === 'string' && typeof w.snapshotUrl === 'string');
  } catch {
    return [];
  }
}

function saveWebcams() {
  try {
    const data = webcams.map(w => ({
      name: w.name,
      snapshotUrl: w.snapshotUrl,
      linkUrl: w.linkUrl || '',
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('Unable to save webcams:', e);
  }
}

// --- Snapshot fetching ---

async function fetchSnapshot(snapshotUrl) {
  const res = await fetch(snapshotUrl);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (!json.jpgUrl) throw new Error('No jpgUrl in response');
  return { jpgUrl: json.jpgUrl, gifUrl: json.gifUrl || '' };
}

// --- Tile rendering ---

function createTileElement(webcam) {
  const tile = document.createElement('a');
  tile.className = 'tile';
  tile.dataset.id = webcam.id;
  if (webcam.linkUrl) {
    tile.href = webcam.linkUrl;
    tile.target = '_blank';
    tile.rel = 'noopener noreferrer';
  }

  const imageWrap = document.createElement('div');
  imageWrap.className = 'tile-image-wrap';

  const jpgImg = document.createElement('img');
  jpgImg.className = 'jpg-layer';
  jpgImg.alt = webcam.name;
  jpgImg.loading = 'lazy';

  const gifImg = document.createElement('img');
  gifImg.className = 'gif-layer';
  gifImg.alt = `${webcam.name} (animated)`;
  gifImg.loading = 'lazy';

  const loadingOverlay = document.createElement('div');
  loadingOverlay.className = 'tile-loading-overlay';

  imageWrap.appendChild(jpgImg);
  imageWrap.appendChild(gifImg);
  imageWrap.appendChild(loadingOverlay);

  const footer = document.createElement('div');
  footer.className = 'tile-footer';

  const nameSpan = document.createElement('span');
  nameSpan.className = 'tile-name';
  nameSpan.textContent = webcam.name;

  footer.appendChild(nameSpan);

  if (webcam.linkUrl) {
    const linkIcon = document.createElement('span');
    linkIcon.className = 'tile-link-icon';
    linkIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>';
    footer.appendChild(linkIcon);
  }

  tile.appendChild(imageWrap);
  tile.appendChild(footer);

  return tile;
}

async function loadTileImage(webcam) {
  const tile = tilesContainer.querySelector(`.tile[data-id="${webcam.id}"]`);
  if (!tile) return;

  const loading = tile.querySelector('.tile-loading-overlay');
  const imageWrap = tile.querySelector('.tile-image-wrap');
  const jpgImg = tile.querySelector('.jpg-layer');
  const gifImg = tile.querySelector('.gif-layer');
  const existingError = tile.querySelector('.tile-error-overlay');
  if (existingError) existingError.remove();

  const hasLoadedImage = jpgImg.dataset.loaded === 'true';
  if (!hasLoadedImage && loading) loading.hidden = false;

  try {
    const data = await fetchSnapshot(webcam.snapshotUrl);
    tileData.set(webcam.id, data);

    if (!hasLoadedImage) {
      // First load: fade image in once loaded
      jpgImg.style.opacity = '0';
      jpgImg.src = data.jpgUrl;
      if (data.gifUrl) gifImg.src = data.gifUrl;
      else gifImg.removeAttribute('src');

      jpgImg.onload = () => {
        jpgImg.dataset.loaded = 'true';
        if (loading) loading.hidden = true;
        requestAnimationFrame(() => { jpgImg.style.opacity = '1'; });
      };
      jpgImg.onerror = () => {
        if (loading) loading.hidden = true;
        showTileError(tile, webcam);
      };
    } else {
      // Subsequent load: crossfade new image over the old one
      const preload = new Image();
      preload.onload = () => {
        const overlay = document.createElement('img');
        overlay.className = 'tile-crossfade-overlay';
        overlay.src = data.jpgUrl;
        imageWrap.appendChild(overlay);

        function finishCrossfade() {
          jpgImg.src = data.jpgUrl;
          if (data.gifUrl) gifImg.src = data.gifUrl;
          else gifImg.removeAttribute('src');
          overlay.remove();
          if (loading) loading.hidden = true;
        }

        // Trigger the CSS transition after the element is in the DOM
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { overlay.style.opacity = '1'; });
        });

        // Clean up after transition (with fallback timeout)
        const fallback = setTimeout(finishCrossfade, 1200);
        overlay.addEventListener('transitionend', () => {
          clearTimeout(fallback);
          finishCrossfade();
        }, { once: true });
      };
      preload.onerror = () => {
        if (loading) loading.hidden = true;
        showTileError(tile, webcam);
      };
      preload.src = data.jpgUrl;
    }
  } catch {
    if (loading) loading.hidden = true;
    showTileError(tile, webcam);
  }
}

function showTileError(tile, webcam) {
  const existing = tile.querySelector('.tile-error-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'tile-error-overlay';

  const msg = document.createElement('p');
  msg.textContent = 'Snapshot unavailable';

  const retryBtn = document.createElement('button');
  retryBtn.className = 'btn btn-secondary';
  retryBtn.textContent = 'Retry';
  retryBtn.style.fontSize = '0.8rem';
  retryBtn.style.padding = '0.4rem 0.8rem';
  retryBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    loadTileImage(webcam);
  });

  overlay.appendChild(msg);
  overlay.appendChild(retryBtn);
  tile.querySelector('.tile-image-wrap').appendChild(overlay);
}

function renderAllTiles() {
  tilesContainer.innerHTML = '';
  tileData.clear();
  webcams.forEach(webcam => {
    const tile = createTileElement(webcam);
    tilesContainer.appendChild(tile);
    loadTileImage(webcam);
  });
  updateEmptyState();
}

function updateEmptyState() {
  emptyState.hidden = webcams.length > 0;
  tilesContainer.hidden = webcams.length === 0;
}

// --- Refresh ---

let isRefreshing = false;
async function refreshAllImages() {
  if (isRefreshing) return;
  isRefreshing = true;
  try {
    for (let i = 0; i < webcams.length; i++) {
      if (i > 0) {
        await new Promise(resolve => setTimeout(resolve, 5000));
      }
      loadTileImage(webcams[i]);
    }
    updateRefreshInfo();
  } finally {
    isRefreshing = false;
  }
}

function updateRefreshInfo() {
  if (webcams.length === 0) {
    refreshInfo.textContent = '';
    return;
  }
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  refreshInfo.textContent = `Updated ${h}:${m}`;
}

function startRefreshTimer() {
  stopRefreshTimer();
  refreshTimer = setInterval(refreshAllImages, REFRESH_INTERVAL);
}

function stopRefreshTimer() {
  if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

// --- Modal ---

function openModal() {
  modalBackdrop.classList.add('open');
  renderWebcamList();
  addName.focus();
}

function closeModal() {
  modalBackdrop.classList.remove('open');
  editingId = null;
}

// --- Webcam list in modal ---

function renderWebcamList() {
  webcamList.innerHTML = '';
  webcamListSection.hidden = webcams.length === 0;

  webcams.forEach(webcam => {
    if (editingId === webcam.id) {
      renderEditForm(webcam);
      return;
    }

    const li = document.createElement('li');
    li.className = 'webcam-list-item';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'item-name';
    nameSpan.textContent = webcam.name;

    const urlSpan = document.createElement('span');
    urlSpan.className = 'item-url';
    urlSpan.textContent = webcam.snapshotUrl;
    urlSpan.title = webcam.snapshotUrl;

    const actions = document.createElement('div');
    actions.className = 'item-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'item-btn';
    editBtn.textContent = 'Edit';
    editBtn.title = 'Edit webcam';
    editBtn.addEventListener('click', () => {
      editingId = webcam.id;
      renderWebcamList();
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'item-btn delete';
    deleteBtn.textContent = '\u2716';
    deleteBtn.title = 'Delete webcam';
    deleteBtn.addEventListener('click', () => {
      webcams = webcams.filter(w => w.id !== webcam.id);
      tileData.delete(webcam.id);
      saveWebcams();
      renderAllTiles();
      renderWebcamList();
    });

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);
    li.appendChild(nameSpan);
    li.appendChild(urlSpan);
    li.appendChild(actions);
    webcamList.appendChild(li);
  });
}

function renderEditForm(webcam) {
  const li = document.createElement('li');
  li.className = 'webcam-edit-form';

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = webcam.name;
  nameInput.placeholder = 'Name';
  nameInput.required = true;

  const snapInput = document.createElement('input');
  snapInput.type = 'url';
  snapInput.value = webcam.snapshotUrl;
  snapInput.placeholder = 'Webcam Image URL';
  snapInput.required = true;

  const linkInput = document.createElement('input');
  linkInput.type = 'url';
  linkInput.value = webcam.linkUrl || '';
  linkInput.placeholder = 'Link URL';

  const actions = document.createElement('div');
  actions.className = 'edit-actions';

  const saveBtn = document.createElement('button');
  saveBtn.type = 'button';
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = 'Save';
  saveBtn.style.fontSize = '0.8rem';
  saveBtn.style.padding = '0.45rem 0.85rem';
  saveBtn.addEventListener('click', () => {
    const name = nameInput.value.trim();
    const snap = snapInput.value.trim();
    if (!name || !snap) return;
    webcam.name = name;
    webcam.snapshotUrl = snap;
    webcam.linkUrl = linkInput.value.trim();
    editingId = null;
    saveWebcams();
    renderAllTiles();
    renderWebcamList();
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.type = 'button';
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.fontSize = '0.8rem';
  cancelBtn.style.padding = '0.45rem 0.85rem';
  cancelBtn.addEventListener('click', () => {
    editingId = null;
    renderWebcamList();
  });

  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);

  li.appendChild(nameInput);
  li.appendChild(snapInput);
  li.appendChild(linkInput);
  li.appendChild(actions);
  webcamList.appendChild(li);
}

// --- Event listeners ---

settingsBtn.addEventListener('click', openModal);
emptyAddBtn.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);

modalBackdrop.addEventListener('click', (e) => {
  if (e.target === modalBackdrop) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalBackdrop.classList.contains('open')) {
    closeModal();
  }
});

resetDefaultsBtn.addEventListener('click', () => {
  if (confirm('Reset all webcams and settings to defaults from config.json?')) {
    resetToDefaults();
  }
});

addForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = addName.value.trim();
  const snapshotUrl = addSnapshotUrl.value.trim();
  const linkUrl = addLinkUrl.value.trim();
  if (!name || !snapshotUrl) return;

  const webcam = {
    id: nextId++,
    name,
    snapshotUrl,
    linkUrl,
  };
  webcams.push(webcam);
  saveWebcams();

  const tile = createTileElement(webcam);
  tilesContainer.appendChild(tile);
  loadTileImage(webcam);
  updateEmptyState();
  renderWebcamList();

  addForm.reset();
  addName.focus();
});

// --- Config loading ---

async function loadConfig() {
  try {
    const res = await fetch('config.json');
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

function saveSettings(settings) {
  try {
    localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings));
  } catch (e) {
    console.warn('Unable to save settings:', e);
  }
}

function applyDisplaySettings(settings) {
  if (!settings) return;
  if (settings.refreshInterval && typeof settings.refreshInterval === 'number') {
    REFRESH_INTERVAL = settings.refreshInterval;
  }
  if (settings.gridMinColumnWidth) {
    tilesContainer.style.gridTemplateColumns =
      `repeat(auto-fill, minmax(min(100%, ${settings.gridMinColumnWidth}px), 1fr))`;
  }
  if (settings.aspectRatio) {
    document.documentElement.style.setProperty('--aspect-ratio', settings.aspectRatio);
  }
}

function resetToDefaults() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SETTINGS_STORAGE_KEY);
  location.reload();
}

// --- Initialize ---

async function init() {
  const storedWebcams = loadWebcams();
  const storedSettings = loadSettings();
  const hasLocalData = storedWebcams.length > 0 || storedSettings !== null;

  if (hasLocalData) {
    // User has overridden config — use localStorage
    webcams = storedWebcams.map(w => ({ ...w, id: nextId++ }));
    applyDisplaySettings(storedSettings);
  } else {
    // No local override — try loading config.json
    const config = await loadConfig();
    if (config) {
      if (config.settings) {
        applyDisplaySettings(config.settings);
      }
      if (Array.isArray(config.webcams)) {
        webcams = config.webcams
          .filter(w => w && typeof w.name === 'string' && typeof w.snapshotUrl === 'string')
          .map(w => ({ ...w, id: nextId++ }));
      }
    }
  }

  renderAllTiles();
  updateRefreshInfo();
  startRefreshTimer();
}

init();
  </script>
